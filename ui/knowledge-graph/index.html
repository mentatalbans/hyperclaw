        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #00d4ff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Hex grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 15V45L30 60L0 45V15Z' fill='none' stroke='%2300d4ff' stroke-opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Secondary grid overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                linear-gradient(90deg, rgba(0, 212, 255, 0.02) 1px, transparent 1px),
                linear-gradient(rgba(0, 212, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Scanning line */
        .scan-line {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #00d4ff 50%, transparent 100%);
            animation: scan 4s linear infinite;
            z-index: 1000;
            opacity: 0.6;
            box-shadow: 0 0 20px #00d4ff, 0 0 40px rgba(0, 212, 255, 0.5);
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            5% { opacity: 0.6; }
            95% { opacity: 0.6; }
            100% { top: 100%; opacity: 0; }
        }

        /* Corner HUD elements */
        .hud-corner {
            position: fixed;
            width: 60px;
            height: 60px;
            border: 1px solid rgba(0, 212, 255, 0.4);
            z-index: 100;
            pointer-events: none;
        }
        .hud-corner.tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .hud-corner.tr { top: 10px; right: 330px; border-left: none; border-bottom: none; }
        .hud-corner.bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .hud-corner.br { bottom: 10px; right: 330px; border-left: none; border-top: none; }

        .container {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Graph container */
        #graph {
            flex: 1;
            position: relative;
        }

        /* Title */
        .title {
            position: absolute;
            top: 20px;
            left: 80px;
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5), 0 0 40px rgba(0, 212, 255, 0.3);
            z-index: 100;
        }

        .title span {
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .title-sub {
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(0, 212, 255, 0.6);
            margin-top: 5px;
        }

        /* Filter bar */
        .filter-bar {
            position: absolute;
            top: 80px;
            left: 80px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        .filter-btn {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #00d4ff;
            padding: 6px 12px;
            font-size: 10px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(0, 212, 255, 0.3);
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        /* Zoom controls */
        .zoom-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 100;
        }

        .zoom-btn {
            width: 36px;
            height: 36px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #00d4ff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .zoom-btn:hover {
            background: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: linear-gradient(180deg, rgba(10, 10, 20, 0.98), rgba(5, 5, 15, 0.98));
            border-left: 1px solid rgba(0, 212, 255, 0.3);
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: rgba(0, 212, 255, 0.7);
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding-bottom: 10px;
        }

        /* Search */
        .search-box {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #fff;
            font-size: 13px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s;
        }

            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            background: rgba(0, 212, 255, 0.1);
        }

        .search-box::placeholder {
            color: rgba(0, 212, 255, 0.4);
        }

        /* Legend */
        .legend {
            margin-bottom: 25px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 11px;
            cursor: pointer;
            padding: 4px 8px;
            margin-left: -8px;
            border-radius: 3px;
            transition: background 0.2s;
        }

        .legend-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 8px currentColor;
        }

        /* Node details */
        .node-details {
            background: rgba(0, 212, 255, 0.03);
            border: 1px solid rgba(0, 212, 255, 0.15);
            padding: 15px;
            margin-top: 15px;
        }

        .node-details h3 {
            color: #fff;
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .node-details p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.7;
        }

        .node-details .type {
            display: inline-block;
            padding: 3px 10px;
            font-size: 9px;
            letter-spacing: 1px;
            border-radius: 2px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .connections-header {
            font-size: 10px;
            letter-spacing: 1px;
            color: rgba(0, 212, 255, 0.5);
            margin-top: 15px;
            margin-bottom: 8px;
        }

        .connections-list {
            max-height: 120px;
            overflow-y: auto;
        }

        .connection-item {
            font-size: 11px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            cursor: pointer;
            transition: color 0.2s;
        }

        .connection-item:hover {
            color: #ffd700;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .stat {
            background: rgba(0, 212, 255, 0.03);
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }

        .stat-value {
            font-size: 22px;
            color: #00d4ff;
            font-weight: 300;
        }

        .stat-label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* SVG styles */
        .link {
            stroke: rgba(0, 212, 255, 0.15);
            stroke-width: 1;
            transition: all 0.3s;
        }

        .link.highlighted {
            stroke: #00d4ff;
            stroke-width: 2.5;
            stroke-opacity: 0.9;
        }

        .link.dimmed {
            stroke-opacity: 0.03;
        }

        .node circle {
            stroke-width: 2;
            cursor: pointer;
            transition: all 0.3s;
        }

        .node:hover circle {
            stroke-width: 3;
            filter: brightness(1.4) drop-shadow(0 0 15px currentColor);
        }

        .node text {
            font-size: 8px;
            fill: rgba(255, 255, 255, 0.9);
            pointer-events: none;
            text-anchor: middle;
            dominant-baseline: central;
            text-shadow: 0 0 3px #000, 0 0 6px #000;
        }

        .node.selected circle {
            stroke: #fff;
            stroke-width: 3;
            animation: selectedPulse 1.5s ease-in-out infinite;
        }

        .node.dimmed {
            opacity: 0.15;
        }

        /* Pulse animation */
        @keyframes pulse {
            0%, 100% { filter: drop-shadow(0 0 8px currentColor); }
            50% { filter: drop-shadow(0 0 15px currentColor); }
        }

        @keyframes selectedPulse {
            0%, 100% { filter: drop-shadow(0 0 10px #fff); }
            50% { filter: drop-shadow(0 0 25px #fff); }
        }

        .node.executive circle {
            animation: pulse 2s ease-in-out infinite;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 212, 255, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.3);
            border-radius: 2px;
        }
    </style>
</head>

                { source: 'Assistant', target: 'SOLOMON', strength: 1 },

                { source: 'Assistant', target: 'FOUNDATION', strength: 0.8 },

                { source: 'SOLOMON', target: 'VENTURE', strength: 0.7 },
                { source: 'GENESIS', target: 'HAL', strength: 0.6 },

                // Business interconnections
                { source: 'FOUNDATION', target: 'NEXUS', strength: 0.7 },
                { source: 'FOUNDATION', target: 'MENTAT', strength: 0.6 },
                { source: 'FOUNDATION', target: 'SELDON', strength: 0.7 },
                { source: 'NEXUS', target: 'HAL', strength: 0.6 },
                { source: 'NEXUS', target: 'ECHO', strength: 0.7 },
                { source: 'NEXUS', target: 'TARS', strength: 0.5 },
                { source: 'CHANI', target: 'MENTAT', strength: 0.5 },
                { source: 'SELDON', target: 'ECHO', strength: 0.6 },
                { source: 'SATOSHI', target: 'ORACLE', strength: 0.9 },
                { source: 'ORACLE', target: 'PREDICTOR', strength: 0.8 },
                { source: 'ARBITER', target: 'VENTURE', strength: 0.7 },

                // Technical network
                { source: 'Assistant', target: 'ARCHITECT', strength: 0.7 },
                { source: 'Assistant', target: 'SENTINEL', strength: 0.8 },
                { source: 'ARCHITECT', target: 'NEXUS_CORE', strength: 0.8 },
                { source: 'ARCHITECT', target: 'SENTINEL', strength: 0.6 },
                { source: 'NEXUS_CORE', target: 'DATAFORGE', strength: 0.7 },
                { source: 'NEXUS_CORE', target: 'STREAMER', strength: 0.6 },
                { source: 'DATAFORGE', target: 'INDEXER', strength: 0.6 },
                { source: 'QUANTUM', target: 'CACHE', strength: 0.5 },
                { source: 'CIPHER', target: 'SENTINEL', strength: 0.8 },
                { source: 'DEBUGGER', target: 'MONITOR', strength: 0.7 },
                { source: 'DEPLOYER', target: 'VALIDATOR', strength: 0.7 },
                { source: 'MONITOR', target: 'BACKUP', strength: 0.5 },
                { source: 'AUTOMATOR', target: 'DEPLOYER', strength: 0.6 },

                // Creative network
                { source: 'Assistant', target: 'NARRATOR', strength: 0.9 },
                { source: 'Assistant', target: 'SCRIBE', strength: 0.7 },
                { source: 'MUSE', target: 'VISIONARY', strength: 0.8 },
                { source: 'MUSE', target: 'SCRIBE', strength: 0.7 },
                { source: 'MUSE', target: 'BRAND', strength: 0.7 },
                { source: 'SCRIBE', target: 'EDITOR', strength: 0.8 },
                { source: 'VISIONARY', target: 'PRESENTER', strength: 0.7 },
                { source: 'DIRECTOR', target: 'COMPOSER', strength: 0.6 },
                { source: 'DIRECTOR', target: 'NARRATOR', strength: 0.7 },
                { source: 'SOCIAL', target: 'BRAND', strength: 0.8 },

                // Personal network
                { source: 'Assistant', target: 'CALENDAR', strength: 0.9 },
                { source: 'Assistant', target: 'INBOX', strength: 0.95 },
                { source: 'Assistant', target: 'TASKS', strength: 0.8 },
                { source: 'CALENDAR', target: 'TASKS', strength: 0.7 },
                { source: 'INBOX', target: 'TASKS', strength: 0.6 },
                { source: 'INBOX', target: 'CONTACTS', strength: 0.6 },
                { source: 'TRAVEL', target: 'CALENDAR', strength: 0.7 },
                { source: 'FINANCE', target: 'TASKS', strength: 0.4 },

                // Scientific network
                { source: 'SOLOMON', target: 'REASONER', strength: 0.8 },
                { source: 'ANALYST', target: 'PREDICTOR', strength: 0.8 },
                { source: 'ANALYST', target: 'RESEARCHER', strength: 0.7 },
                { source: 'PREDICTOR', target: 'SIMULATOR', strength: 0.7 },
                { source: 'OPTIMIZER', target: 'SIMULATOR', strength: 0.6 },
                { source: 'CLASSIFIER', target: 'EMBEDDER', strength: 0.8 },
                { source: 'EMBEDDER', target: 'INDEXER', strength: 0.7 },

                // Skills to agents
                { source: 'INBOX', target: 'skill_email', strength: 0.9 },
                { source: 'CALENDAR', target: 'skill_calendar', strength: 0.9 },
                { source: 'RESEARCHER', target: 'skill_search', strength: 0.8 },
                { source: 'ARCHITECT', target: 'skill_code', strength: 0.9 },
                { source: 'SCRIBE', target: 'skill_write', strength: 0.9 },
                { source: 'ANALYST', target: 'skill_analyze', strength: 0.9 },
                { source: 'SATOSHI', target: 'skill_trade', strength: 1 },
                { source: 'RESEARCHER', target: 'skill_research', strength: 0.9 },
                { source: 'VISIONARY', target: 'skill_design', strength: 0.9 },
                { source: 'DIRECTOR', target: 'skill_video', strength: 0.9 },
                { source: 'NARRATOR', target: 'skill_voice', strength: 1 },
                { source: 'DEPLOYER', target: 'skill_deploy', strength: 0.9 },
                { source: 'MONITOR', target: 'skill_monitor', strength: 0.9 },
                { source: 'SENTINEL', target: 'skill_secure', strength: 0.9 },
                { source: 'BACKUP', target: 'skill_backup', strength: 0.9 },
                { source: 'PRESENTER', target: 'skill_report', strength: 0.8 },
                { source: 'PRESENTER', target: 'skill_present', strength: 0.9 },
                { source: 'Assistant', target: 'skill_chat', strength: 1 },
                { source: 'AUTOMATOR', target: 'skill_automate', strength: 0.9 },
                { source: 'NEXUS_CORE', target: 'skill_integrate', strength: 0.8 },
                { source: 'PREDICTOR', target: 'skill_predict', strength: 0.9 },
                { source: 'OPTIMIZER', target: 'skill_optimize', strength: 0.9 },
                { source: 'VALIDATOR', target: 'skill_validate', strength: 0.9 },
                { source: 'DATAFORGE', target: 'skill_transform', strength: 0.8 },
                { source: 'ANALYST', target: 'skill_visualize', strength: 0.7 },

                // Integrations to agents
                { source: 'INBOX', target: 'int_gmail', strength: 0.9 },
                { source: 'CALENDAR', target: 'int_gcal', strength: 0.9 },
                { source: 'NARRATOR', target: 'int_elevenlabs', strength: 1 },
                { source: 'DIRECTOR', target: 'int_runway', strength: 0.9 },
                { source: 'SATOSHI', target: 'int_hyperliquid', strength: 1 },
                { source: 'ARCHITECT', target: 'int_github', strength: 0.8 },
                { source: 'DEPLOYER', target: 'int_github', strength: 0.7 }
            ]
        };

        // Update stats
        document.getElementById('node-count').textContent = data.nodes.length;
        document.getElementById('link-count').textContent = data.links.length;

        // Set up SVG
        const graphEl = document.getElementById('graph');
        const width = graphEl.clientWidth;
        const height = graphEl.clientHeight;

        const svg = d3.select('#graph')
            .append('svg')
            .attr('width', width)
            .attr('height', height);

        // Add glow filter
        const defs = svg.append('defs');
        const filter = defs.append('filter')
            .attr('id', 'glow')
            .attr('x', '-50%')
            .attr('y', '-50%')
            .attr('width', '200%')
            .attr('height', '200%');
        filter.append('feGaussianBlur')
            .attr('stdDeviation', '3')
            .attr('result', 'coloredBlur');
        const feMerge = filter.append('feMerge');
        feMerge.append('feMergeNode').attr('in', 'coloredBlur');
        feMerge.append('feMergeNode').attr('in', 'SourceGraphic');

        // Add zoom behavior
        const g = svg.append('g');
        const zoom = d3.zoom()
            .scaleExtent([0.2, 5])
            .on('zoom', (event) => {
                g.attr('transform', event.transform);
            });
        svg.call(zoom);

        // Create simulation
        const simulation = d3.forceSimulation(data.nodes)
            .force('link', d3.forceLink(data.links)
                .id(d => d.id)
                .distance(d => 100 - (d.strength || 0.5) * 30)
                .strength(d => (d.strength || 0.5) * 0.3))
            .force('charge', d3.forceManyBody()
                .strength(-250)
                .distanceMax(400))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collision', d3.forceCollide().radius(d => sizes[d.group] + 8));

        // Draw links
        const link = g.append('g')
            .selectAll('line')
            .data(data.links)
            .join('line')
            .attr('class', 'link')
            .attr('stroke-width', d => (d.strength || 0.5) * 2);

        // Draw nodes
        const node = g.append('g')
            .selectAll('g')
            .data(data.nodes)
            .join('g')
            .attr('class', d => `node ${d.group}`)
            .call(d3.drag()
                .on('start', dragstarted)
                .on('drag', dragged)
                .on('end', dragended));

        node.append('circle')
            .attr('r', d => sizes[d.group])
            .attr('fill', d => colors[d.group])
            .attr('stroke', d => colors[d.group])
            .style('filter', 'url(#glow)');

        node.append('text')
            .text(d => {
                const name = d.id.replace('skill_', '').replace('int_', '');
                return name.length > 8 ? name.substring(0, 7) + '..' : name;
            })
            .attr('dy', 3)
            .style('font-size', d => d.group === 'skills' ? '6px' : '8px');

        // Selected node tracking
        let selectedNode = null;

        // Node click handler
        node.on('click', (event, d) => {
            event.stopPropagation();
            selectNode(d);
        });

        // Click background to deselect
        svg.on('click', () => {
            deselectAll();
        });

        function selectNode(d) {
            selectedNode = d;

            // Find connected nodes
            const connectedIds = new Set([d.id]);
            data.links.forEach(l => {
                const sourceId = l.source.id || l.source;
                const targetId = l.target.id || l.target;
                if (sourceId === d.id) connectedIds.add(targetId);
                if (targetId === d.id) connectedIds.add(sourceId);
            });

            // Update node classes
            node.classed('selected', n => n.id === d.id);
            node.classed('dimmed', n => !connectedIds.has(n.id));

            // Update link classes
            link.classed('highlighted', l => {
                const sourceId = l.source.id || l.source;
                const targetId = l.target.id || l.target;
                return sourceId === d.id || targetId === d.id;
            });
            link.classed('dimmed', l => {
                const sourceId = l.source.id || l.source;
                const targetId = l.target.id || l.target;
                return sourceId !== d.id && targetId !== d.id;
            });

            // Update details panel
            const connections = data.links.filter(l => {
                const sourceId = l.source.id || l.source;
                const targetId = l.target.id || l.target;
                return sourceId === d.id || targetId === d.id;
            });

            const connectedNodes = connections.map(conn => {
                const sourceId = conn.source.id || conn.source;
                const targetId = conn.target.id || conn.target;
                const connectedId = sourceId === d.id ? targetId : sourceId;
                return data.nodes.find(n => n.id === connectedId);
            }).filter(Boolean);

            const details = document.getElementById('details');
            details.innerHTML = `
                <div class="type" style="background: ${colors[d.group]}; color: #000;">${d.group.toUpperCase()}</div>
                <h3>${d.id}</h3>
                <p>${d.description}</p>
                <div class="connections-header">CONNECTIONS (${connectedNodes.length})</div>
                <div class="connections-list">
                    ${connectedNodes.map(n => `
                        <div class="connection-item" data-id="${n.id}" style="color: ${colors[n.group]}">${n.id}</div>
                    `).join('')}
                </div>
            `;

            // Add click handlers for connection items
            details.querySelectorAll('.connection-item').forEach(item => {
                item.addEventListener('click', () => {
                    const nodeData = data.nodes.find(n => n.id === item.dataset.id);
                    if (nodeData) selectNode(nodeData);
                });
            });
        }

        function deselectAll() {
            selectedNode = null;
            node.classed('selected', false);
            node.classed('dimmed', false);
            link.classed('highlighted', false);
            link.classed('dimmed', false);

            document.getElementById('details').innerHTML = `
                <p style="color: rgba(255,255,255,0.4);">Click a node to view details</p>
            `;
        }

        // Search functionality
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            if (!query) {
                node.style('opacity', 1);
                link.style('opacity', null);
                return;
            }
            node.style('opacity', d =>
                d.id.toLowerCase().includes(query) ||
                d.description.toLowerCase().includes(query) ? 1 : 0.1
            );
            link.style('opacity', 0.05);
        });

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilter(btn.dataset.filter);
            });
        });

        // Legend items as filters
        document.querySelectorAll('.legend-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                applyFilter(item.dataset.filter);
            });
        });

        function applyFilter(filter) {
            if (filter === 'all') {
                node.style('opacity', 1);
                link.style('opacity', null);
            } else {
                node.style('opacity', d => d.group === filter ? 1 : 0.1);
                link.style('opacity', l => {
                    const sourceNode = data.nodes.find(n => n.id === (l.source.id || l.source));
                    const targetNode = data.nodes.find(n => n.id === (l.target.id || l.target));
                    return (sourceNode?.group === filter || targetNode?.group === filter) ? 0.4 : 0.02;
                });
            }
        }

        // Zoom controls
        document.getElementById('zoom-in').addEventListener('click', () => {
            svg.transition().duration(300).call(zoom.scaleBy, 1.4);
        });
        document.getElementById('zoom-out').addEventListener('click', () => {
            svg.transition().duration(300).call(zoom.scaleBy, 0.7);
        });
        document.getElementById('zoom-reset').addEventListener('click', () => {
            svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
        });

        // Simulation tick
        simulation.on('tick', () => {
            link
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);

            node.attr('transform', d => `translate(${d.x},${d.y})`);
        });

        // Drag functions
        function dragstarted(event) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            event.subject.fx = event.subject.x;
            event.subject.fy = event.subject.y;
        }

        function dragged(event) {
            event.subject.fx = event.x;
            event.subject.fy = event.y;
        }

        function dragended(event) {
            if (!event.active) simulation.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            const newWidth = graphEl.clientWidth;
            const newHeight = graphEl.clientHeight;
            svg.attr('width', newWidth).attr('height', newHeight);
            simulation.force('center', d3.forceCenter(newWidth / 2, newHeight / 2));
            simulation.alpha(0.3).restart();
        });
    </script>
</body>
</html>
